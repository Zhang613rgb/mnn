name: Build MNN-LLM Android APK (OpenCL + QNN/NPU)

on:
  workflow_dispatch:  # 手动触发
  push:
    branches: [main]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 120

    steps:
      - name: Checkout MNN
        uses: actions/checkout@v4
        with:
          repository: alibaba/MNN
          submodules: recursive
          path: MNN

      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Setup Android SDK & NDK
        uses: android-actions/setup-android@v3

      - name: Install NDK
        run: |
          sdkmanager "ndk;26.1.10909125"
          echo "ANDROID_NDK=$ANDROID_HOME/ndk/26.1.10909125" >> $GITHUB_ENV

      - name: Build MNN native libs (OpenCL + LLM, QNN disabled)
        run: |
          cd MNN/project/android
          mkdir -p build_64
          cd build_64
          # QNN 已在 CI 中禁用以避免缺少私有 SDK 导致失败
          bash ../build_64.sh \
            -DMNN_BUILD_LLM=true \
            -DMNN_ARM82=true \
            -DMNN_CPU_WEIGHT_DEQUANT_GEMM=true \
            -DMNN_QNN=false \
            -DMNN_WITH_PLUGIN=true \
            -DLLM_SUPPORT_VISION=true \
            -DLLM_SUPPORT_AUDIO=true \
            -DMNN_BUILD_AUDIO=true 2>&1 | tee build.log

      - name: Upload Build Log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: build-log
          path: MNN/project/android/build_64/build.log
          retention-days: 30

      - name: Show build errors (summary)
        if: always()
        run: |
          LOG=MNN/project/android/build_64/build.log
          if [ -f "$LOG" ]; then
            echo "==== First 200 lines of build.log ===="
            head -n 200 "$LOG" || true
            echo "==== Error-related lines ===="
            grep -n -E "error:|fatal error|undefined reference|internal compiler error|segmentation fault|Killed" "$LOG" || true
          else
            echo "No build.log found"
          fi

      - name: Copy .so files to jniLibs
        run: |
          DEST=MNN/project/android/apps/MnnLlmApp/app/src/main/jniLibs/arm64-v8a
          mkdir -p $DEST
          find MNN/project/android/build_64 -name "*.so" -exec cp -v {} $DEST/ \;
          echo "=== Libraries ==="
          ls -lh $DEST/ || true

      - name: Build debug APK
        run: |
          cd MNN/project/android/apps/MnnLlmApp
          chmod +x gradlew
          ./gradlew assembleDebug --no-daemon

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: MNN-LLM-OpenCL-QNN-APK
          path: MNN/project/android/apps/MnnLlmApp/app/build/outputs/apk/debug/*.apk
          retention-days: 90
